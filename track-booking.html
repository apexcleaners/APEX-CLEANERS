<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <!-- SEO Meta Tags -->
    <title>Track Your Booking – Apex Cleaners | Mutare, Zimbabwe</title>
    <meta name="description" content="Track your Apex Cleaners booking status. Enter your Booking ID to check your cleaning service status in Mutare, Zimbabwe." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://apexcleaners.github.io/APEX-CLEANERS/track-booking.html" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apexcleaners.github.io/APEX-CLEANERS/track-booking.html" />
    <meta property="og:title" content="Track Your Booking – Apex Cleaners" />
    <meta property="og:description" content="Track your Apex Cleaners booking status in Mutare, Zimbabwe. Enter your Booking ID to check your cleaning service status." />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .status-pending { background-color: #f59e0b; }
        .status-confirmed { background-color: #10b981; }
        .status-completed { background-color: #3b82f6; }
        .status-cancelled { background-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col">

    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-2xl w-full">
            <!-- Back link -->
            <a href="index.html" class="inline-flex items-center gap-2 text-[#14B8A6] hover:text-[#0D9488] mb-6 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back to Home
            </a>

            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-white mt-4">Track Your <span class="text-[#14B8A6]">Booking</span></h1>
                <p class="text-gray-400 mt-3">Enter the unique Booking ID you received after booking.</p>
            </div>

            <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700">
                <form id="track-form" class="space-y-4">
                    <div>
                        <label class="block text-gray-300 mb-2" for="booking-id">Booking ID</label>
                        <input type="text" id="booking-id" required 
                               class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:border-[#14B8A6] outline-none" 
                               placeholder="e.g., a1b2c3d4e5f6...">
                        <p class="text-gray-500 text-xs mt-1">Your Booking ID was shown after you submitted the booking form.</p>
                    </div>
                    <button type="submit" id="track-btn" 
                            class="w-full py-3 bg-[#14B8A6] hover:bg-[#0D9488] text-white font-bold rounded-xl transition flex items-center justify-center gap-2">
                        <span id="btn-text">Track Booking</span>
                        <span id="spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    </button>
                </form>

                <div id="result-area" class="mt-6 hidden">
                    <h3 class="text-lg font-semibold text-white mb-3">Booking Status</h3>
                    <div id="booking-card" class="bg-gray-700 rounded-xl p-4 border border-gray-600"></div>
                </div>
                <div id="error-message" class="mt-4 text-red-400 text-sm text-center hidden"></div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 py-4 border-t border-gray-800">
        <div class="text-center text-sm text-gray-500">
            &copy; 2026 Apex Cleaners. All rights reserved.
            <a href="index.html" class="ml-2 text-[#14B8A6] hover:underline">Back to Home</a>
            <a href="privacy.html" class="ml-2 text-[#14B8A6] hover:underline">Privacy Policy</a>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const form = document.getElementById('track-form');
        const bookingIdInput = document.getElementById('booking-id');
        const resultArea = document.getElementById('result-area');
        const bookingCard = document.getElementById('booking-card');
        const errorDiv = document.getElementById('error-message');
        const trackBtn = document.getElementById('track-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');

        function getStatusBadge(status) {
            const statusMap = {
                pending: 'bg-yellow-600',
                confirmed: 'bg-green-600',
                completed: 'bg-blue-600',
                cancelled: 'bg-red-600'
            };
            const bgClass = statusMap[status] || 'bg-gray-600';
            return `<span class="px-3 py-1 rounded-full text-white text-xs font-semibold ${bgClass}">${status.toUpperCase()}</span>`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Not specified';
            const parts = dateStr.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateStr;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const bookingId = bookingIdInput.value.trim();
            if (!bookingId) return;

            // Show loading state
            resultArea.classList.add('hidden');
            errorDiv.classList.add('hidden');
            btnText.textContent = 'Tracking…';
            spinner.classList.remove('hidden');
            trackBtn.disabled = true;

            try {
                const docRef = doc(db, 'bookings', bookingId);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    errorDiv.textContent = 'No booking found with that ID. Please check and try again.';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                const booking = docSnap.data();
                const status = booking.status || 'pending';
                const service = booking.service || 'Not specified';
                const date = booking.preferredDate || 'Not specified';
                const time = booking.preferredTime || 'Not specified';
                const frequency = booking.frequency || 'Not specified';
                const propertySize = booking.propertySize || 'Not specified';
                const specialNotes = booking.specialInstructions || '';
                const createdAt = booking.createdAt?.toDate ? booking.createdAt.toDate().toLocaleString() : 'Unknown';

                bookingCard.innerHTML = `
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-300 font-medium">Status:</span>
                            ${getStatusBadge(status)}
                        </div>
                        <div><span class="text-gray-300 font-medium">Service:</span> ${escapeHtml(service)}</div>
                        <div><span class="text-gray-300 font-medium">Date:</span> ${escapeHtml(formatDate(date))}</div>
                        <div><span class="text-gray-300 font-medium">Time:</span> ${escapeHtml(time)}</div>
                        <div><span class="text-gray-300 font-medium">Frequency:</span> ${escapeHtml(frequency)}</div>
                        <div><span class="text-gray-300 font-medium">Property Size:</span> ${escapeHtml(propertySize)}</div>
                        ${specialNotes ? `<div><span class="text-gray-300 font-medium">Special Instructions:</span> ${escapeHtml(specialNotes)}</div>` : ''}
                        <div class="text-gray-500 text-xs pt-2">Booking created: ${escapeHtml(createdAt)}</div>
                        <div class="text-gray-500 text-xs">Booking ID: ${escapeHtml(bookingId)}</div>
                    </div>
                `;
                resultArea.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Something went wrong. Please try again later.';
                errorDiv.classList.remove('hidden');
            } finally {
                btnText.textContent = 'Track Booking';
                spinner.classList.add('hidden');
                trackBtn.disabled = false;
            }
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
    </script>
</body>
</html>
