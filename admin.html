<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Cleaners - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .tab-active { border-bottom: 2px solid #14B8A6; color: #14B8A6; }
        .status-pending { background: #f59e0b; }
        .status-confirmed { background: #10b981; }
        .status-completed { background: #3b82f6; }
        .status-cancelled { background: #ef4444; }
    </style>
</head>
<body class="bg-gray-900">

    <!-- Login Section -->
    <div id="login-section" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-700">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white">Admin <span class="text-[#14B8A6]">Login</span></h2>
                <p class="text-gray-400 mt-2">Sign in to manage reviews & bookings</p>
            </div>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Email</label>
                    <input type="email" id="login-email" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:border-[#14B8A6] outline-none" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Password</label>
                    <input type="password" id="login-password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:border-[#14B8A6] outline-none" required>
                </div>
                <button type="submit" class="w-full py-3 bg-[#14B8A6] hover:bg-[#0D9488] text-white font-bold rounded-lg transition">Login</button>
                <div id="login-error" class="mt-4 text-red-400 text-sm text-center hidden"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard Section (hidden until login) -->
    <div id="dashboard-section" class="hidden">
        <!-- Header -->
        <div class="bg-gray-800 border-b border-gray-700 sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-3">
                <h1 class="text-2xl font-bold text-white">Admin <span class="text-[#14B8A6]">Dashboard</span></h1>
                <div class="flex items-center gap-3 flex-wrap">
                    <span id="admin-email" class="text-gray-300 text-sm break-all"></span>
                    <button id="logout-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm transition whitespace-nowrap">Logout</button>
                </div>
            </div>
            <!-- Tabs -->
            <div class="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-4 sm:gap-8">
                <button id="tab-reviews" class="tab-btn py-3 px-2 font-medium transition-colors whitespace-nowrap">📝 Reviews</button>
                <button id="tab-bookings" class="tab-btn py-3 px-2 font-medium transition-colors whitespace-nowrap">📅 Bookings</button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <!-- Reviews Panel -->
            <div id="reviews-panel" class="panel">
                <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                    <h2 class="text-2xl font-bold text-white">Manage Reviews</h2>
                    <div class="flex flex-wrap gap-4 text-sm">
                        <span>Total: <span id="stat-total" class="font-bold text-[#14B8A6]">0</span></span>
                        <span>Approved: <span id="stat-approved" class="font-bold text-green-400">0</span></span>
                        <span>Pending: <span id="stat-pending" class="font-bold text-yellow-400">0</span></span>
                    </div>
                </div>
                <div id="reviews-loading" class="text-center py-10 text-gray-400">Loading reviews...</div>
                <div id="reviews-empty" class="hidden text-center py-10 text-gray-400">No reviews found.</div>
                <div id="reviews-list" class="space-y-4"></div>
            </div>

            <!-- Bookings Panel (hidden by default) -->
            <div id="bookings-panel" class="panel hidden">
                <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                    <h2 class="text-2xl font-bold text-white">Manage Bookings</h2>
                    <div class="flex flex-wrap gap-4 text-sm">
                        <span>Total: <span id="booking-total" class="font-bold text-[#14B8A6]">0</span></span>
                        <span>Pending: <span id="booking-pending" class="font-bold text-yellow-400">0</span></span>
                    </div>
                </div>
                <div id="bookings-loading" class="text-center py-10 text-gray-400">Loading bookings...</div>
                <div id="bookings-empty" class="hidden text-center py-10 text-gray-400">No bookings found.</div>
                <div id="bookings-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Firebase & Scripts -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { 
            collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // DOM elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const adminEmailSpan = document.getElementById('admin-email');

        // Tabs
        const tabReviews = document.getElementById('tab-reviews');
        const tabBookings = document.getElementById('tab-bookings');
        const reviewsPanel = document.getElementById('reviews-panel');
        const bookingsPanel = document.getElementById('bookings-panel');
        const tabBtns = document.querySelectorAll('.tab-btn');

        // Reviews containers
        const reviewsList = document.getElementById('reviews-list');
        const reviewsLoading = document.getElementById('reviews-loading');
        const reviewsEmpty = document.getElementById('reviews-empty');
        const statTotal = document.getElementById('stat-total');
        const statApproved = document.getElementById('stat-approved');
        const statPending = document.getElementById('stat-pending');

        // Bookings containers
        const bookingsList = document.getElementById('bookings-list');
        const bookingsLoading = document.getElementById('bookings-loading');
        const bookingsEmpty = document.getElementById('bookings-empty');
        const bookingTotal = document.getElementById('booking-total');
        const bookingPending = document.getElementById('booking-pending');

        let unsubscribeReviews = null;
        let unsubscribeBookings = null;
        let currentUser = null;

        // Tab switching
        function switchTab(tab) {
            tabBtns.forEach(btn => btn.classList.remove('tab-active', 'text-[#14B8A6]'));
            if (tab === 'reviews') {
                tabReviews.classList.add('tab-active', 'text-[#14B8A6]');
                reviewsPanel.classList.remove('hidden');
                bookingsPanel.classList.add('hidden');
            } else {
                tabBookings.classList.add('tab-active', 'text-[#14B8A6]');
                reviewsPanel.classList.add('hidden');
                bookingsPanel.classList.remove('hidden');
            }
        }

        tabReviews.addEventListener('click', () => switchTab('reviews'));
        tabBookings.addEventListener('click', () => switchTab('bookings'));

        // ==================== AUTH ====================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            loginError.classList.add('hidden');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                loginError.textContent = 'Invalid email or password.';
                loginError.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                adminEmailSpan.textContent = user.email;
                loadReviews();
                loadBookings();
            } else {
                if (unsubscribeReviews) unsubscribeReviews();
                if (unsubscribeBookings) unsubscribeBookings();
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                currentUser = null;
            }
        });

        // ==================== REVIEWS ====================
        function loadReviews() {
            reviewsLoading.classList.remove('hidden');
            const q = query(collection(db, 'reviews'), orderBy('createdAt', 'desc'));
            unsubscribeReviews = onSnapshot(q, (snapshot) => {
                reviewsLoading.classList.add('hidden');
                const reviews = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Update stats
                const total = reviews.length;
                const approved = reviews.filter(r => r.approved === true).length;
                const pending = total - approved;
                statTotal.textContent = total;
                statApproved.textContent = approved;
                statPending.textContent = pending;

                if (reviews.length === 0) {
                    reviewsEmpty.classList.remove('hidden');
                    reviewsList.innerHTML = '';
                    return;
                }
                reviewsEmpty.classList.add('hidden');
                reviewsList.innerHTML = '';
                reviews.forEach(review => {
                    reviewsList.appendChild(createReviewCard(review));
                });
            }, (error) => {
                console.error(error);
                reviewsLoading.classList.add('hidden');
                reviewsEmpty.classList.remove('hidden');
                reviewsEmpty.innerHTML = 'Error loading reviews. Check console.';
            });
        }

        function createReviewCard(review) {
            const card = document.createElement('div');
            card.className = 'bg-gray-800 rounded-xl p-5 border border-gray-700';
            const date = review.createdAt?.toDate ? review.createdAt.toDate().toLocaleString() : 'Unknown date';
            const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
            card.innerHTML = `
                <div class="flex flex-col sm:flex-row justify-between items-start gap-4">
                    <div class="flex-1">
                        <h3 class="font-bold text-white text-lg">${escapeHtml(review.name)}</h3>
                        <div class="text-yellow-400 text-sm mt-1">${stars}</div>
                        <p class="text-gray-300 text-sm mt-2">${escapeHtml(review.review)}</p>
                        <p class="text-gray-500 text-xs mt-2">${date}</p>
                    </div>
                    <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                        ${!review.approved ? `<button class="approve-btn px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-white text-sm whitespace-nowrap">Approve</button>` : ''}
                        <button class="delete-btn px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-white text-sm whitespace-nowrap">Delete</button>
                    </div>
                </div>
            `;
            if (!review.approved) {
                const approveBtn = card.querySelector('.approve-btn');
                approveBtn.addEventListener('click', async () => {
                    await updateDoc(doc(db, 'reviews', review.id), { approved: true });
                });
            }
            const deleteBtn = card.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', async () => {
                if (confirm('Delete this review permanently?')) {
                    await deleteDoc(doc(db, 'reviews', review.id));
                }
            });
            return card;
        }

        // ==================== BOOKINGS ====================
        function loadBookings() {
            bookingsLoading.classList.remove('hidden');
            const q = query(collection(db, 'bookings'), orderBy('createdAt', 'desc'));
            unsubscribeBookings = onSnapshot(q, (snapshot) => {
                bookingsLoading.classList.add('hidden');
                const bookings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const total = bookings.length;
                const pending = bookings.filter(b => b.status === 'pending').length;
                bookingTotal.textContent = total;
                bookingPending.textContent = pending;

                if (bookings.length === 0) {
                    bookingsEmpty.classList.remove('hidden');
                    bookingsList.innerHTML = '';
                    return;
                }
                bookingsEmpty.classList.add('hidden');
                bookingsList.innerHTML = '';
                bookings.forEach(booking => {
                    bookingsList.appendChild(createBookingCard(booking));
                });
            }, (error) => {
                console.error(error);
                bookingsLoading.classList.add('hidden');
                bookingsEmpty.classList.remove('hidden');
                bookingsEmpty.innerHTML = 'Error loading bookings. Check console.';
            });
        }

        function createBookingCard(booking) {
            const card = document.createElement('div');
            card.className = 'bg-gray-800 rounded-xl p-5 border border-gray-700';
            const date = booking.createdAt?.toDate ? booking.createdAt.toDate().toLocaleString() : 'Unknown';
            const statusColors = {
                pending: 'bg-yellow-600',
                confirmed: 'bg-green-600',
                completed: 'bg-blue-600',
                cancelled: 'bg-red-600'
            };
            const statusClass = statusColors[booking.status] || 'bg-gray-600';
            card.innerHTML = `
                <div class="flex flex-col gap-4">
                    <div class="flex flex-wrap justify-between items-start gap-3">
                        <div>
                            <h3 class="font-bold text-white text-lg">${escapeHtml(booking.name)}</h3>
                            <p class="text-gray-300 text-sm break-all">${escapeHtml(booking.email)} | ${escapeHtml(booking.phone)}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-white text-xs font-semibold ${statusClass}">${booking.status?.toUpperCase() || 'PENDING'}</span>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 text-sm">
                        <div><span class="text-gray-400">Service:</span> ${escapeHtml(booking.service)}</div>
                        <div><span class="text-gray-400">Date:</span> ${escapeHtml(booking.preferredDate)}</div>
                        <div><span class="text-gray-400">Time:</span> ${escapeHtml(booking.preferredTime)}</div>
                        <div><span class="text-gray-400">Frequency:</span> ${escapeHtml(booking.frequency)}</div>
                        <div><span class="text-gray-400">Property Size:</span> ${escapeHtml(booking.propertySize)}</div>
                        <div><span class="text-gray-400">Created:</span> ${date}</div>
                    </div>
                    ${booking.specialInstructions ? `<p class="text-gray-400 text-sm mt-2"><span class="text-gray-500">Notes:</span> ${escapeHtml(booking.specialInstructions)}</p>` : ''}
                    <div class="flex flex-wrap gap-2">
                        <select data-id="${booking.id}" class="status-select bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm w-full sm:w-auto">
                            <option value="pending" ${booking.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="confirmed" ${booking.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                            <option value="completed" ${booking.status === 'completed' ? 'selected' : ''}>Completed</option>
                            <option value="cancelled" ${booking.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                        <button class="delete-booking px-3 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-white text-sm w-full sm:w-auto">Delete</button>
                    </div>
                </div>
            `;
            const statusSelect = card.querySelector('.status-select');
            statusSelect.addEventListener('change', async (e) => {
                const newStatus = e.target.value;
                await updateDoc(doc(db, 'bookings', booking.id), { status: newStatus });
            });
            const deleteBtn = card.querySelector('.delete-booking');
            deleteBtn.addEventListener('click', async () => {
                if (confirm(`Delete booking from ${booking.name}?`)) {
                    await deleteDoc(doc(db, 'bookings', booking.id));
                }
            });
            return card;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, (m) => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
